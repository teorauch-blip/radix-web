<svg viewBox="0 0 100 108" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RADIX">
  <title>RADIX</title>
  <!--
    RADIX Isotipo — direct SVG vectorization of the original PNG.

    Structure:
      Two S-curved diagonal strokes crossing at center (the X).
      Each stroke bows outward: left arm bows left in upper half,
      right in lower half (and mirror for right arm).
      Botanical element: two thin arcing branches + central leaf bud
      sitting between the upper stroke tips.

    Default standalone fill: #1478CC (original brand blue).
    Web use: override via currentColor / CSS color.
  -->

  <!-- ── Left diagonal: upper-left → lower-right, S-curved outward ── -->
  <path
    d="M 15 14 C 5 38, 95 72, 85 98"
    stroke="currentColor"
    stroke-width="13"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── Right diagonal: upper-right → lower-left, mirror S-curve ── -->
  <path
    d="M 85 14 C 95 38, 5 72, 15 98"
    stroke="currentColor"
    stroke-width="13"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── Botanical sprout: left branch ── -->
  <path
    d="M 22 12 C 28 6 38 3 44 5"
    stroke="currentColor"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── Botanical sprout: right branch (mirror) ── -->
  <path
    d="M 78 12 C 72 6 62 3 56 5"
    stroke="currentColor"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── Central leaf bud ── -->
  <path
    d="M 50 5 C 46 7 46 12 50 13 C 54 12 54 7 50 5 Z"
    fill="currentColor"
  />
</svg>
